name: Backend CI

on:
  push:
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest
          pip install pytest-asyncio
          pip install httpx
          pip install fastapi
          pip install uvicorn
          pip install alembic
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check . || true

      - name: Run Tests
        run: |
          pytest -q

  migrations:
    if: github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install alembic

      - name: Run Alembic
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not configured."
            exit 0
          fi

          alembic upgrade head
